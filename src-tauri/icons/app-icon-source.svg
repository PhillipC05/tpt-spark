<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient: deep dark purple-grey -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#151020"/>
      <stop offset="100%" stop-color="#0d0a18"/>
    </linearGradient>

    <!-- Lightning bolt fill gradient: violet → lighter purple -->
    <linearGradient id="bolt" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#a899ff"/>
      <stop offset="55%" stop-color="#7c6af5"/>
      <stop offset="100%" stop-color="#5a4ccc"/>
    </linearGradient>

    <!-- Soft outer glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Rounded-rect clip -->
    <clipPath id="round">
      <rect width="1024" height="1024" rx="200" ry="200"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="200" ry="200" fill="url(#bg)"/>

  <!-- Subtle inner ring accent -->
  <rect x="32" y="32" width="960" height="960" rx="175" ry="175"
        fill="none" stroke="#7c6af5" stroke-width="4" stroke-opacity="0.18"/>

  <!-- Glow halo behind bolt -->
  <ellipse cx="512" cy="510" rx="210" ry="240"
           fill="#7c6af5" fill-opacity="0.12" filter="url(#glow)"/>

  <!--
    Lightning bolt polygon.
    Classic zig-zag bolt centred in the 1024×1024 canvas.
    Top arm goes top-right, then cuts left on the middle bar, then
    bottom arm points bottom-right.
    Coordinates tuned to sit comfortably inside the rounded-square frame.
  -->
  <polygon
    points="
      590,110
      340,520
      490,520
      434,914
      684,480
      530,480
      590,110
    "
    fill="url(#bolt)"
    clip-path="url(#round)"
  />

  <!-- Bright highlight on the top-left edge of the bolt -->
  <polygon
    points="
      590,110
      340,520
      390,520
      590,150
    "
    fill="#c4baff"
    fill-opacity="0.35"
    clip-path="url(#round)"
  />
</svg>
